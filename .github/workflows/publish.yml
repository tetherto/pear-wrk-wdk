name: publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        required: false
        default: true
  # Allow calling this workflow from other workflows (local tests with act)
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        required: false
        default: true
    secrets:
      NPM_TOKEN:
        required: false

  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22.19.0
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Auth for private GitHub git deps
        run: |
          git config --global url."https://${PAT_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${PAT_TOKEN}:x-oauth-basic@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${PAT_TOKEN}:x-oauth-basic@github.com/".insteadOf "git@github.com:"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Lint Standard
        run: npm run lint
      - name: Install bare
        run: npm install -g bare

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: worklet-bundle
          path: |
            bundle/worklet.bundle.mjs
            bundle/worklet.bundle.d.mts
          if-no-files-found: error

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22.19.0
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Auth for private GitHub git deps
        run: |
          git config --global url."https://${PAT_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${PAT_TOKEN}:x-oauth-basic@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${PAT_TOKEN}:x-oauth-basic@github.com/".insteadOf "git@github.com:"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
